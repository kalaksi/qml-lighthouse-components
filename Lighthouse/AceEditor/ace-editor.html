<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace Editor</title>
    <style type="text/css" media="screen">
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
        }
        #editor {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            background: transparent;
        }

        html.lk-ace-scrollbar-custom .ace_editor .ace_scrollbar-v,
        html.lk-ace-scrollbar-custom .ace_editor .ace_scrollbar-h {
            color-scheme: dark;
        }

        html.lk-ace-scrollbar-custom .ace_editor .ace_scrollbar-v::-webkit-scrollbar,
        html.lk-ace-scrollbar-custom .ace_editor .ace_scrollbar-h::-webkit-scrollbar {
            width: var(--lk-scrollbar-size, 10px);
            height: var(--lk-scrollbar-size, 10px);
        }

        html.lk-ace-scrollbar-custom .ace_editor .ace_scrollbar-v::-webkit-scrollbar-track,
        html.lk-ace-scrollbar-custom .ace_editor .ace_scrollbar-h::-webkit-scrollbar-track {
            background: var(--lk-scrollbar-track, #1d1f21);
        }

        html.lk-ace-scrollbar-custom .ace_editor .ace_scrollbar-v::-webkit-scrollbar-thumb,
        html.lk-ace-scrollbar-custom .ace_editor .ace_scrollbar-h::-webkit-scrollbar-thumb {
            background: var(--lk-scrollbar-thumb, #4b4e55);
            border-radius: var(--lk-scrollbar-radius, 4px);
        }

        html.lk-ace-scrollbar-custom .ace_editor .ace_scrollbar-v::-webkit-scrollbar-thumb:hover,
        html.lk-ace-scrollbar-custom .ace_editor .ace_scrollbar-h::-webkit-scrollbar-thumb:hover {
            background: var(--lk-scrollbar-thumb-hover, #5a5d65);
        }
    </style>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
</head>
<body>
    <div id="editor"></div>
    <script src="ace-builds/src-min-noconflict/ace.js"></script>
    <script>
        var editor = null;
        var bridge = null;

        function initializeAce() {
            if (typeof ace === 'undefined') {
                console.error('ace is not available');
                return;
            }

            if (window.editor) {
                console.error('Ace editor already initialized');
                return;
            }

            ace.config.set('basePath', 'ace-builds/src-min-noconflict');

            window.editor = ace.edit('editor');

            // Setup WebChannel
            new QWebChannel(qt.webChannelTransport, function(channel) {
                window.bridge = channel.objects.bridge;

                window.editor.session.on('change', function() {
                    window.bridge.contentChanged(window.editor.getValue());
                });

                ace.config.loadModule(['keybinding', 'ace/keyboard/vim'], function() {
                    var Vim = ace.require('ace/keyboard/vim').Vim;

                    Vim.defineEx('write', 'w', function() {
                        window.bridge.writeRequested();
                    });
                    Vim.defineEx('quit', 'q', function(cm, params) {
                        var rest = params.argString ? params.argString.trim() : '';
                        var discardChanges = rest.indexOf('!') === 0;
                        window.bridge.quitRequested(false, discardChanges, false);
                    });
                    Vim.defineEx('wq', 'wq', function() {
                        window.bridge.quitRequested(true, false, false);
                    });
                    Vim.defineEx('x', 'x', function() {
                        window.bridge.quitRequested(false, false, true);
                    });

                    ace.config.loadModule(['keybinding', 'ace/keyboard/emacs'], function() {
                        var emacsHandler = ace.require('ace/keyboard/emacs').handler;
                        emacsHandler.addCommands({
                            lkWrite: {
                                exec: function() {
                                    window.bridge.writeRequested();
                                },
                                readOnly: true
                            },
                            lkQuit: {
                                exec: function() {
                                    window.bridge.quitRequested(false, false, false);
                                },
                                readOnly: true
                            }
                        });
                        emacsHandler.bindKey('C-x C-s', 'lkWrite');
                        emacsHandler.bindKey('C-x C-c', 'lkQuit');

                        window.bridge.editorReady();
                    });
                });
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeAce);
        } else {
            initializeAce();
        }
    </script>
</body>
</html>
